<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antares Token Exporter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #1a1a1a;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #e6e6e6;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .header p {
      margin-top: 3px;
      color: #666;
      font-size: 11px;
      line-height: 1.5;
    }

    /* ── Scrollable body ─────────────────────────────────── */
    .body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    /* ── Empty / error / loading states ─────────────────── */
    .state-msg {
      text-align: center;
      padding: 40px 24px;
      color: #888;
      line-height: 1.6;
    }
    .state-msg strong { color: #1a1a1a; display: block; margin-bottom: 6px; }

    .error-msg {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      border-radius: 6px;
      padding: 10px 12px;
      color: #c00;
      margin-bottom: 12px;
    }

    /* ── Collection card ──────────────────────────────────── */
    .collection {
      border: 1px solid #e6e6e6;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .collection-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      background: #f7f7f7;
      border-bottom: 1px solid #e6e6e6;
    }
    .collection-name {
      font-weight: 600;
      font-size: 12px;
      flex: 1;
    }
    .badge {
      background: #e0e0e0;
      border-radius: 100px;
      padding: 2px 7px;
      font-size: 10px;
      color: #555;
    }

    /* ── Mode row ─────────────────────────────────────────── */
    .mode-row {
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .mode-row:last-child { border-bottom: none; }

    .mode-label {
      font-size: 11px;
      color: #555;
      white-space: nowrap;
      min-width: 56px;
    }

    .filename-input {
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;
      border: 1px solid #d5d5d5;
      border-radius: 5px;
      padding: 4px 8px;
      width: 100%;
      background: #fff;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }
    .filename-input:focus {
      outline: none;
      border-color: #18a0fb;
      box-shadow: 0 0 0 2px rgba(24,160,251,0.2);
    }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.12s, opacity 0.12s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.45; cursor: default; }

    .btn-ghost {
      background: transparent;
      border: 1px solid #d5d5d5;
      color: #333;
      padding: 4px 10px;
    }
    .btn-ghost:hover:not(:disabled) { background: #f0f0f0; }

    .btn-primary {
      background: #18a0fb;
      color: #fff;
      padding: 4px 12px;
    }
    .btn-primary:hover:not(:disabled) { background: #0d8de0; }

    /* ── Footer ───────────────────────────────────────────── */
    .footer {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid #e6e6e6;
      background: #fafafa;
      gap: 8px;
    }
    .footer-info {
      font-size: 11px;
      color: #888;
    }

    /* ── Progress indicator ───────────────────────────────── */
    .progress {
      font-size: 11px;
      color: #18a0fb;
      display: none;
    }
    .progress.visible { display: block; }

    /* ── Toolbar (select all) ───────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px 6px;
      border-bottom: 1px solid #e6e6e6;
      flex-shrink: 0;
      font-size: 11px;
      color: #555;
    }

    /* ── Chevron ──────────────────────────────────────────── */
    .chevron-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 2px;
      color: #888;
      line-height: 0;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    .chevron-btn:hover { color: #444; }
    .collection.collapsed > .collection-header {
      border-bottom: none;
    }
    .collection-body.hidden {
      display: none;
    }

    /* ── Checkboxes ──────────────────────────────────────── */
    .collection-checkbox,
    .mode-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border: 1.5px solid #b0b0b0;
      border-radius: 3px;
      background: #fff;
      cursor: pointer;
      flex-shrink: 0;
      margin: 0;
      position: relative;
      transition: background 0.1s, border-color 0.1s;
    }
    .collection-checkbox:checked,
    .mode-checkbox:checked {
      background: #18a0fb;
      border-color: #18a0fb;
    }
    .collection-checkbox:indeterminate {
      background: #18a0fb;
      border-color: #18a0fb;
    }
    .collection-checkbox:checked::after,
    .mode-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 1px;
      width: 5px;
      height: 8px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }
    .collection-checkbox:indeterminate::after {
      content: '';
      position: absolute;
      left: 2px;
      top: 5px;
      width: 8px;
      height: 2px;
      background: #fff;
      border-radius: 1px;
    }

    /* ── Spinner ─────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #d0d0d0;
      border-top-color: #18a0fb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="header">
    <h1>Antares Token Exporter</h1>
    <p>Esporta le collezioni Figma come JSON compatibili con <code>build.js</code>.</p>
  </div>

  <div class="toolbar" id="toolbar" style="display:none">
    <input type="checkbox" class="collection-checkbox" id="cb-select-all" checked />
    <span>Seleziona tutto</span>
  </div>

  <div class="body" id="body">
    <div class="state-msg" id="loading">
      <span class="spinner"></span>
    </div>
  </div>

  <div class="footer">
    <span class="footer-info" id="footer-info"></span>
    <div style="display:flex;gap:8px;align-items:center;">
      <span class="progress" id="progress-msg"></span>
      <button class="btn btn-primary" id="btn-download-all" disabled>
        ↓ Scarica selezione
      </button>
    </div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────

    /** @type {Array<{collectionId, modeId, filename}>} */
    let pendingDownloads = [];

    /** @type {string} Name of the Figma file, used for ZIP naming */
    let figmaFileName = 'tokens';

    // ── Init ───────────────────────────────────────────────────────────────────

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      switch (msg.type) {
        case 'COLLECTIONS':
          figmaFileName = msg.fileName || 'tokens';
          renderCollections(msg.data);
          break;

        case 'EXPORT_DATA':
          handleExportData(msg.collectionId, msg.modeId, msg.json);
          break;

        case 'EXPORT_ALL_DATA':
          handleExportAllData(msg.results);
          break;

        case 'ERROR':
          showError(msg.message);
          break;
      }
    };

    // Tell code.js we're ready
    parent.postMessage({ pluginMessage: { type: 'READY' } }, '*');

    // ── Render ─────────────────────────────────────────────────────────────────

    function renderCollections(collections) {
      const body = document.getElementById('body');

      if (!collections || collections.length === 0) {
        body.innerHTML = `
          <div class="state-msg">
            <strong>Nessuna variabile trovata</strong>
            Questo file Figma non contiene Local Variable Collections.<br/>
            Apri un file con variabili definite.
          </div>`;
        return;
      }

      let totalModes = 0;
      body.innerHTML = '';

      for (const col of collections) {
        totalModes += col.modes.length;
        body.appendChild(buildCollectionCard(col));
      }

      document.getElementById('footer-info').textContent =
        `${collections.length} collection${collections.length !== 1 ? 's' : ''}, ${totalModes} file${totalModes !== 1 ? 's' : ''}`;
      document.getElementById('btn-download-all').disabled = false;

      // Show and wire the global select-all checkbox
      const toolbar = document.getElementById('toolbar');
      toolbar.style.display = 'flex';
      const cbAll = document.getElementById('cb-select-all');
      cbAll.addEventListener('change', () => {
        document.querySelectorAll('.collection .collection-checkbox').forEach((cb) => {
          cb.checked = cbAll.checked;
          cb.indeterminate = false;
        });
        document.querySelectorAll('.mode-checkbox').forEach((cb) => {
          cb.checked = cbAll.checked;
        });
        updateDownloadAllButton();
      });
    }

    function buildCollectionCard(col) {
      const card = document.createElement('div');
      card.className = 'collection';
      card.dataset.collectionId = col.id;

      // ── Header ────────────────────────────────────────────
      const header = document.createElement('div');
      header.className = 'collection-header';

      const colCheckbox = document.createElement('input');
      colCheckbox.type = 'checkbox';
      colCheckbox.className = 'collection-checkbox';
      colCheckbox.checked = true;
      header.appendChild(colCheckbox);

      const colName = document.createElement('span');
      colName.className = 'collection-name';
      colName.textContent = `${col.name} (${col.modes.length})`;
      header.appendChild(colName);

      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = `${col.variableCount} variabili`;
      header.appendChild(badge);

      const caretBtn = document.createElement('button');
      caretBtn.className = 'chevron-btn';
      caretBtn.title = 'Espandi / Comprimi';
      caretBtn.innerHTML = chevronSvg('up');
      header.appendChild(caretBtn);

      card.appendChild(header);

      // ── Mode rows (collapsible body) ───────────────────────
      const collectionBody = document.createElement('div');
      collectionBody.className = 'collection-body';

      for (const mode of col.modes) {
        const suggested = suggestFilename(col.name, mode.name, col.modes.length);

        const row = document.createElement('div');
        row.className = 'mode-row';
        row.dataset.modeId = mode.modeId;

        const modeCheckbox = document.createElement('input');
        modeCheckbox.type = 'checkbox';
        modeCheckbox.className = 'mode-checkbox';
        modeCheckbox.checked = true;
        row.appendChild(modeCheckbox);

        const modeLabel = document.createElement('span');
        modeLabel.className = 'mode-label';
        modeLabel.textContent = mode.name;
        row.appendChild(modeLabel);

        const filenameInput = document.createElement('input');
        filenameInput.type = 'text';
        filenameInput.className = 'filename-input';
        filenameInput.value = suggested;
        filenameInput.spellcheck = false;
        row.appendChild(filenameInput);

        const exportBtn = document.createElement('button');
        exportBtn.className = 'btn btn-ghost';
        exportBtn.dataset.action = 'export-one';
        exportBtn.textContent = '↓';
        exportBtn.addEventListener('click', () => {
          const filename = filenameInput.value.trim() || suggested;
          requestExport(col.id, mode.modeId, filename, row);
        });
        row.appendChild(exportBtn);

        collectionBody.appendChild(row);
      }

      card.appendChild(collectionBody);

      // ── Caret wiring ──────────────────────────────────────
      caretBtn.addEventListener('click', () => {
        const collapsed = card.classList.toggle('collapsed');
        collectionBody.classList.toggle('hidden', collapsed);
        caretBtn.innerHTML = chevronSvg(collapsed ? 'down' : 'up');
      });

      // ── Checkbox wiring ───────────────────────────────────
      // Collection → all modes
      colCheckbox.addEventListener('change', () => {
        card.querySelectorAll('.mode-checkbox').forEach((cb) => {
          cb.checked = colCheckbox.checked;
        });
        updateDownloadAllButton();
      });

      // Each mode → update collection state
      card.querySelectorAll('.mode-checkbox').forEach((cb) => {
        cb.addEventListener('change', () => {
          updateCollectionCheckbox(card);
          updateDownloadAllButton();
        });
      });

      return card;
    }

    // ── Checkbox helpers ───────────────────────────────────────────────────────

    /**
     * Sync the collection-level checkbox with the state of its mode checkboxes.
     * all checked → checked, none checked → unchecked, mixed → indeterminate.
     */
    function updateCollectionCheckbox(card) {
      const modeCbs = [...card.querySelectorAll('.mode-checkbox')];
      const colCb   = card.querySelector('.collection-checkbox');
      const n = modeCbs.filter((cb) => cb.checked).length;
      if (n === 0) {
        colCb.checked = false;
        colCb.indeterminate = false;
      } else if (n === modeCbs.length) {
        colCb.checked = true;
        colCb.indeterminate = false;
      } else {
        colCb.checked = false;
        colCb.indeterminate = true;
      }
    }

    /** Enable "Scarica tutti" only when at least one mode is checked. */
    function updateDownloadAllButton() {
      const anyChecked = document.querySelectorAll('.mode-checkbox:checked').length > 0;
      document.getElementById('btn-download-all').disabled = !anyChecked;
      updateSelectAllCheckbox();
    }

    /** Sync the global select-all checkbox with all mode checkboxes. */
    function updateSelectAllCheckbox() {
      const cbAll = document.getElementById('cb-select-all');
      if (!cbAll) return;
      const modeCbs = [...document.querySelectorAll('.mode-checkbox')];
      const checked = modeCbs.filter((cb) => cb.checked).length;
      if (checked === 0) {
        cbAll.checked = false; cbAll.indeterminate = false;
      } else if (checked === modeCbs.length) {
        cbAll.checked = true; cbAll.indeterminate = false;
      } else {
        cbAll.checked = false; cbAll.indeterminate = true;
      }
    }

    // ── Filename suggestion ────────────────────────────────────────────────────

    /**
     * Propose a filename from the collection + mode names.
     * If the collection has a single mode → "collection.json"
     * If the collection has multiple modes → "collection.mode.json"
     */
    function suggestFilename(colName, modeName, modeCount) {
      const normalize = (s) =>
        s.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');

      const col  = normalize(colName);
      const mode = normalize(modeName);

      if (modeCount === 1) {
        return `${col}.json`;
      }
      return `${col}.${mode}.json`;
    }

    // ── Export – single ────────────────────────────────────────────────────────

    function requestExport(collectionId, modeId, filename, rowEl) {
      const btn = rowEl.querySelector('[data-action="export-one"]');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      // Store filename so we can use it in the response
      pendingDownloads.push({ collectionId, modeId, filename });

      parent.postMessage({
        pluginMessage: { type: 'EXPORT', collectionId, modeId },
      }, '*');

      // Restore button after a timeout (in case response never comes)
      setTimeout(() => { btn.disabled = false; btn.textContent = '↓'; }, 8000);
    }

    function handleExportData(collectionId, modeId, json) {
      // Find pending record
      const idx = pendingDownloads.findIndex(
        (p) => p.collectionId === collectionId && p.modeId === modeId
      );
      const filename = idx >= 0
        ? pendingDownloads.splice(idx, 1)[0].filename
        : `export-${Date.now()}.json`;

      downloadJson(json, filename);

      // Re-enable the button
      const row = document.querySelector(
        `[data-collection-id="${CSS.escape(collectionId)}"] [data-mode-id="${CSS.escape(modeId)}"]`
      );
      if (row) {
        const btn = row.querySelector('[data-action="export-one"]');
        if (btn) { btn.disabled = false; btn.textContent = '↓'; }
      }
    }

    // ── Export – all ───────────────────────────────────────────────────────────

    document.getElementById('btn-download-all').addEventListener('click', () => {
      // Collect only checked mode rows
      const filenameMap = {};
      const selections  = [];

      document.querySelectorAll('.mode-row').forEach((row) => {
        const modeCb = row.querySelector('.mode-checkbox');
        if (!modeCb || !modeCb.checked) return;

        const card     = row.closest('.collection');
        const colId    = card.dataset.collectionId;
        const modeId   = row.dataset.modeId;
        const filename = row.querySelector('.filename-input').value.trim() || `export.json`;

        filenameMap[`${colId}::${modeId}`] = filename;
        selections.push({ collectionId: colId, modeId });
      });

      if (selections.length === 0) return;

      // Save for later use
      window._filenameMap = filenameMap;

      document.getElementById('btn-download-all').disabled = true;
      showProgress('Raccolta dati…');

      parent.postMessage({ pluginMessage: { type: 'EXPORT_ALL', selections } }, '*');
    });

    function handleExportAllData(results) {
      const map = window._filenameMap || {};

      const files = results.map((r) => ({
        name: map[`${r.collectionId}::${r.modeId}`]
          || suggestFilename(r.collectionName, r.modeName, r.modeCount),
        content: JSON.stringify(r.json, null, 2),
      }));

      showProgress(`Creazione ZIP…`);

      const zipBytes = createZip(files);
      const blob = new Blob([zipBytes], { type: 'application/zip' });
      downloadBlob(blob, normalizeZipName(figmaFileName) + '.zip');

      hideProgress();
      document.getElementById('btn-download-all').disabled = false;
    }

    // ── Download helpers ───────────────────────────────────────────────────────

    function normalizeZipName(s) {
      return s.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '') || 'tokens';
    }

    function downloadJson(json, filename) {
      const jsonStr  = JSON.stringify(json, null, 2);
      const zipBytes = createZip([{ name: filename, content: jsonStr }]);
      const blob     = new Blob([zipBytes], { type: 'application/zip' });
      downloadBlob(blob, normalizeZipName(figmaFileName) + '.zip');
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href     = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    // ── ZIP writer (no external deps) ─────────────────────────────────────────

    function crc32(data) {
      if (!crc32._table) {
        crc32._table = new Uint32Array(256);
        for (let i = 0; i < 256; i++) {
          let c = i;
          for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
          crc32._table[i] = c;
        }
      }
      let crc = 0xFFFFFFFF;
      for (let i = 0; i < data.length; i++)
        crc = crc32._table[(crc ^ data[i]) & 0xFF] ^ (crc >>> 8);
      return (crc ^ 0xFFFFFFFF) >>> 0;
    }

    /**
     * Build a ZIP archive (STORE, no compression) from an array of
     * { name: string, content: string } objects. Returns a Uint8Array.
     */
    function createZip(files) {
      const enc = new TextEncoder();
      const locals = [];
      let offset = 0;

      for (const file of files) {
        const nameBytes = enc.encode(file.name);
        const dataBytes = enc.encode(file.content);
        const crc       = crc32(dataBytes);
        const lh        = new Uint8Array(30 + nameBytes.length);
        const lv        = new DataView(lh.buffer);
        lv.setUint32( 0, 0x04034b50, true); // local file header sig
        lv.setUint16( 4, 20,         true); // version needed
        lv.setUint16( 6, 0,          true); // flags
        lv.setUint16( 8, 0,          true); // compression: STORE
        lv.setUint16(10, 0,          true); // mod time
        lv.setUint16(12, 0,          true); // mod date
        lv.setUint32(14, crc,        true); // crc-32
        lv.setUint32(18, dataBytes.length, true); // compressed size
        lv.setUint32(22, dataBytes.length, true); // uncompressed size
        lv.setUint16(26, nameBytes.length, true); // filename length
        lv.setUint16(28, 0,          true); // extra field length
        lh.set(nameBytes, 30);
        locals.push({ lh, dataBytes, nameBytes, crc, offset });
        offset += lh.length + dataBytes.length;
      }

      const centralStart = offset;
      const centrals = [];

      for (const e of locals) {
        const ch = new Uint8Array(46 + e.nameBytes.length);
        const cv = new DataView(ch.buffer);
        cv.setUint32( 0, 0x02014b50, true); // central dir sig
        cv.setUint16( 4, 20,         true); // version made by
        cv.setUint16( 6, 20,         true); // version needed
        cv.setUint16( 8, 0,          true); // flags
        cv.setUint16(10, 0,          true); // compression: STORE
        cv.setUint16(12, 0,          true); // mod time
        cv.setUint16(14, 0,          true); // mod date
        cv.setUint32(16, e.crc,      true); // crc-32
        cv.setUint32(20, e.dataBytes.length, true); // compressed size
        cv.setUint32(24, e.dataBytes.length, true); // uncompressed size
        cv.setUint16(28, e.nameBytes.length, true); // filename length
        cv.setUint16(30, 0,          true); // extra field length
        cv.setUint16(32, 0,          true); // file comment length
        cv.setUint16(34, 0,          true); // disk number start
        cv.setUint16(36, 0,          true); // internal attrs
        cv.setUint32(38, 0,          true); // external attrs
        cv.setUint32(42, e.offset,   true); // local header offset
        ch.set(e.nameBytes, 46);
        centrals.push(ch);
        offset += ch.length;
      }

      const centralSize = offset - centralStart;
      const eocd = new Uint8Array(22);
      const ev   = new DataView(eocd.buffer);
      ev.setUint32( 0, 0x06054b50,       true); // end of central dir sig
      ev.setUint16( 4, 0,                true); // disk number
      ev.setUint16( 6, 0,                true); // disk with central dir
      ev.setUint16( 8, locals.length,    true); // entries on this disk
      ev.setUint16(10, locals.length,    true); // total entries
      ev.setUint32(12, centralSize,      true); // central dir size
      ev.setUint32(16, centralStart,     true); // central dir offset
      ev.setUint16(20, 0,                true); // comment length

      const parts = [
        ...locals.flatMap((e) => [e.lh, e.dataBytes]),
        ...centrals,
        eocd,
      ];
      const total  = parts.reduce((s, p) => s + p.length, 0);
      const result = new Uint8Array(total);
      let pos = 0;
      for (const p of parts) { result.set(p, pos); pos += p.length; }
      return result;
    }

    // ── Error ──────────────────────────────────────────────────────────────────

    function showError(message) {
      const body = document.getElementById('body');
      const existing = body.querySelector('.error-msg');
      if (existing) existing.remove();

      const el = document.createElement('div');
      el.className = 'error-msg';
      el.textContent = `⚠ ${message}`;
      body.prepend(el);
    }

    // ── Progress ───────────────────────────────────────────────────────────────

    function showProgress(text) {
      const el = document.getElementById('progress-msg');
      el.textContent = text;
      el.classList.add('visible');
    }

    function hideProgress() {
      const el = document.getElementById('progress-msg');
      el.textContent = '';
      el.classList.remove('visible');
    }

    // ── Utility ────────────────────────────────────────────────────────────────

    function chevronSvg(direction) {
      const points = direction === 'up'
        ? '4 9 8 5 12 9'
        : '4 7 8 11 12 7';
      return `<svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="${points}" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
